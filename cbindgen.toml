# cbindgen configuration for shgo-rs C/C++ bindings

[defines]

[export]
include = []
exclude = []

[export.rename]
"ShgoOptions_C" = "ShgoOptions"
"ShgoResult_C" = "ShgoResult"
"ShgoLocalMinimum_C" = "ShgoLocalMinimum"

[fn]
prefix = ""
postfix = ""
args = "Auto"
rename_args = "None"
sort_by = "None"

[struct]
rename_fields = "None"
derive_constructor = false
derive_eq = false
derive_neq = false
derive_lt = false
derive_lte = false
derive_gt = false
derive_gte = false

[enum]
rename_variants = "None"
add_sentinel = false
prefix_with_name = false
derive_helper_methods = false
derive_const_casts = false
derive_mut_casts = false
cast_assert_name = "assert"
must_use = ""
deprecated = ""
deprecated_variant = ""

[const]
allow_static_const = true
allow_constexpr = true

[macro_expansion]
bitflags = false

# Language output
language = "C++"

# Header configuration
header = """/*
 * SHGO - Simplicial Homology Global Optimization
 * 
 * A high-performance global optimization library.
 * 
 * This header file is auto-generated by cbindgen. Do not edit manually.
 */
"""
trailer = ""
include_guard = "SHGO_H"
pragma_once = true
autogen_warning = "/* Warning: this file is autogenerated by cbindgen. Do not modify this manually. */"
include_version = true
namespace = "shgo"
namespaces = []
using_namespaces = []
sys_includes = ["cstdarg", "cstdint", "cstdlib", "ostream", "new"]
includes = []
no_includes = false
after_includes = ""

# Documentation
documentation = true
documentation_style = "doxy"
documentation_length = "full"

# C++ specific
[cxx]
extra_types = []

# Parse configuration - only parse ffi module
[parse]
parse_deps = false
include = []
exclude = ["coordinates", "vertex", "complex", "sobol", "error", "shgo", "local_opt"]
clean = false
extra_bindings = []

[parse.expand]
crates = []
all_features = false
default_features = true
features = []
